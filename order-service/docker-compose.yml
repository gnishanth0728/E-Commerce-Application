version: '3.8'

services:
  order-db:
    image: mysql:8.4
    container_name: order-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_order
    ports:
      - "3308:3306"
    volumes:
      - ./db/order_init.sql:/docker-entrypoint-initdb.d/init.sql
      - order-db-data:/var/lib/mysql
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  order-db-data:

networks:
  ecommerce-network:
    driver: bridge
