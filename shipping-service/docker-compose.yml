version: '3.8'

services:
  shipping-db:
    image: mysql:8.4
    container_name: shipping-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce_shipping
    ports:
      - "3310:3306"
    volumes:
      - ./db/shipping_init.sql:/docker-entrypoint-initdb.d/init.sql
      - shipping-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  shipping-db-data:
